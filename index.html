<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורטל איסוף נתונים - תוכנית החומש</title>
    
    <!-- Scripts for React, ReactDOM and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Assistant -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Assistant', sans-serif !important; }
        .bg-magenta-soft { background-color: rgba(217, 70, 239, 0.05); }
        .border-magenta-soft { border-color: rgba(217, 70, 239, 0.2); }
        .thin-border { border-width: 1px !important; }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-white text-[#070543]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- הקישור המעודכן שלך מגוגל מוטמע כאן ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVk-QIxM-d6r3cGuvxo41g_y85fXzTr_INkdKZEdUzfMG6aqPPHhuU7XNFigUDb8VC/exec";

        function App() {
            const [step, setStep] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [activeModal, setActiveModal] = useState(null);

            const [formData, setFormData] = useState({
                senderName: '', senderEmail: '', programName: '', supplierName: '',
                channel: '', contactName: '', contactPhone: '', contactEmail: ''
            });

            const [infoFiles, setInfoFiles] = useState([]);
            const [costFiles, setCostFiles] = useState([]);

            const fileToBase64 = (file) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({
                    name: file.name,
                    mimeType: file.type,
                    data: reader.result.split(',')[1]
                });
            });

            const handleSubmit = async () => {
                if (!formData.senderName || !formData.programName) {
                    alert("נא למלא את כל שדות החובה (שם ממלא ושם תוכנית).");
                    return;
                }
                setIsSubmitting(true);
                try {
                    const infoPayload = await Promise.all(Array.from(infoFiles).map(fileToBase64));
                    const costPayload = await Promise.all(Array.from(costFiles).map(fileToBase64));
                    
                    const payload = {
                        ...formData,
                        date: new Date().toLocaleString('he-IL'),
                        infoFiles: infoPayload,
                        costFiles: costPayload
                    };

                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(payload)
                    });
                    setStep(3);
                } catch (e) {
                    alert("חלה שגיאה בשליחה. נא לוודא חיבור אינטרנט ותקינות הקישור.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (step === 3) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-right fade-in" dir="rtl">
                        <div className="max-w-4xl w-full text-center space-y-12">
                            <div className="text-[10rem]">✅</div>
                            <h2 className="text-7xl font-black text-[#070543]">תודה רבה!</h2>
                            <div className="bg-slate-50 p-12 rounded-[3rem] border-r-[20px] border-[#070543] text-right shadow-inner">
                                <p className="text-4xl font-bold mb-6">הפרטים והמסמכים התקבלו בהצלחה.</p>
                                <p className="text-2xl text-gray-600 font-medium">צוות תוכנית החומש יעבור על המידע ויחזור אליך במידת הצורך בכתובת המייל שצוינה.</p>
                            </div>
                            <button onClick={() => location.reload()} className="text-3xl font-bold underline text-blue-700 hover:text-[#070543] transition-colors">חזרה לדף הראשי</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6 md:p-12 fade-in" dir="rtl">
                    <header className="flex flex-col items-center mb-12">
                        <img src="לוגו שקוף מחוז.png" className="w-[400px] mb-8" alt="לוגו" />
                        <h1 className="text-6xl font-black text-center mb-2 tracking-tight">תוכנית החומש לחינוך במזרח ירושלים</h1>
                        <p className="text-4xl text-gray-500 font-bold italic">איסוף מידע ומסמכים - תשפ"ז</p>
                    </header>

                    <main className="max-w-5xl mx-auto bg-white border-2 border-gray-100 rounded-[2.5rem] shadow-2xl p-8 md:p-16">
                        {step === 0 && (
                            <div className="space-y-12">
                                <div className="text-3xl leading-relaxed space-y-8 text-right">
                                    <p className="font-bold text-4xl">שותפים יקרים,</p>
                                    <p>לקראת הגשת תוכנית העבודה לשנה"ל תשפ"ז, אנו נדרשים לאסוף את כל המידע הנדרש.</p>
                                    <p>לפניכם כלי לאיסוף מידע כולל הסבר על המסמכים הנדרשים לצורך בחינת התוכניות ואישורן ותבנית אחידה להגשתם:</p>
                                </div>

                                <div className="bg-magenta-soft border-y-4 border-magenta-soft/30 p-10 rounded-2xl text-center">
                                    <p className="text-3xl font-medium text-[#d946ef]">יש למלא את הטופס כולל העלאת המסמכים <br /> עד לתאריך 12.5.26.</p>
                                </div>

                                <div className="space-y-10">
                                    <h3 className="text-4xl font-bold text-center">להלן הסבר על המסמכים הנדרשים:</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 justify-items-center">
                                        {[
                                            { id: 'info', icon: '📝', label: 'דף מידע על תוכנית' },
                                            { id: 'costs', icon: '₪', label: 'מסמך פירוט עלויות' },
                                            { id: 'yearly', icon: '📅', label: 'תוכנית עבודה שנתית' }
                                        ].map(item => (
                                            <button key={item.id} onClick={() => setActiveModal(item.id)} className="flex flex-col items-center gap-6 p-10 border thin-border border-[#070543] rounded-2xl hover:bg-slate-50 transition-all w-full max-w-[280px] shadow-sm">
                                                <span className="text-7xl">{item.icon}</span>
                                                <span className="text-2xl font-normal text-center leading-tight">{item.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex justify-center pt-16">
                                    <button onClick={() => setStep(1)} className="bg-[#070543] text-white px-32 py-8 rounded-2xl text-5xl font-black shadow-2xl hover:scale-105 transition-transform">המשך למילוי הטופס</button>
                                </div>
                            </div>
                        )}

                        {step === 1 && (
                            <div className="space-y-12">
                                <h2 className="text-5xl font-black border-b-8 border-[#070543] pb-6">חלק ראשון: פרטי זהות</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10 text-2xl text-right">
                                    <div className="flex flex-col gap-4">
                                        <label className="font-bold">שם ממלא הטופס:</label>
                                        <input type="text" onChange={e => setFormData({...formData, senderName: e.target.value})} className="p-6 border-2 border-[#070543] rounded-2xl outline-none focus:ring-8 focus:ring-blue-50" placeholder="שם מלא" />
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <label className="font-bold">מייל:</label>
                                        <input type="email" onChange={e => setFormData({...formData, senderEmail: e.target.value})} className="p-6 border-2 border-[#070543] rounded-2xl outline-none focus:ring-8 focus:ring-blue-50" placeholder="example@email.com" />
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <label className="font-bold">שם התוכנית:</label>
                                        <input type="text" onChange={e => setFormData({...formData, programName: e.target.value})} className="p-6 border-2 border-[#070543] rounded-2xl outline-none focus:ring-8 focus:ring-blue-50" />
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <label className="font-bold">שם הספק:</label>
                                        <input type="text" onChange={e => setFormData({...formData, supplierName: e.target.value})} className="p-6 border-2 border-[#070543] rounded-2xl outline-none focus:ring-8 focus:ring-blue-50" />
                                    </div>
                                </div>
                                <div className="flex justify-between pt-12">
                                    <button onClick={() => setStep(0)} className="text-3xl font-bold underline">חזרה</button>
                                    <button onClick={() => setStep(2)} className="bg-[#070543] text-white px-16 py-6 rounded-2xl text-3xl font-black shadow-xl">הבא להעלאת מסמכים</button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="space-y-12">
                                <h2 className="text-5xl font-black border-b-8 border-[#070543] pb-6">חלק שני: העלאת מסמכים</h2>
                                <div className="bg-slate-50 p-12 rounded-[3rem] space-y-8 border thin-border border-gray-200 text-right">
                                    <h3 className="text-4xl font-bold text-navy">1. אודות התוכנית (Word)</h3>
                                    <input type="file" multiple onChange={e => setInfoFiles(e.target.files)} className="w-full p-6 bg-white border-2 border-[#070543] rounded-2xl text-xl" />
                                </div>
                                <div className="bg-slate-50 p-12 rounded-[3rem] space-y-8 border thin-border border-gray-200 text-right">
                                    <h3 className="text-4xl font-bold text-navy">2. פירוט עלויות (Word)</h3>
                                    <input type="file" multiple onChange={e => setCostFiles(e.target.files)} className="w-full p-6 bg-white border-2 border-[#070543] rounded-2xl text-xl" />
                                </div>
                                <div className="flex justify-center pt-12">
                                    <button onClick={handleSubmit} disabled={isSubmitting} className="bg-[#070543] text-white px-32 py-10 rounded-3xl text-5xl font-black shadow-2xl disabled:bg-gray-400">
                                        {isSubmitting ? "שולח נתונים..." : "שלח הגשה סופית"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-40 text-gray-300 text-2xl flex flex-col items-center gap-10 pb-32">
                        <div className="w-20 h-1 bg-gray-100 rounded-full mb-4"></div>
                        <p>© 2026 מחוז העיר ירושלים - משרד החינוך</p>
                    </footer>

                    {activeModal && (
                        <div className="fixed inset-0 bg-navy/90 flex items-center justify-center p-6 z-[200] backdrop-blur-md" onClick={() => setActiveModal(null)}>
                            <div className="bg-white p-16 rounded-[4rem] max-w-3xl w-full text-right shadow-2xl relative border-8 border-white/20" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setActiveModal(null)} className="absolute top-8 left-8 text-8xl font-light hover:rotate-90 transition-transform">×</button>
                                <h2 className="text-5xl font-black mb-10 border-b-4 pb-4 border-[#070543]">הסבר על המסמך</h2>
                                <p className="text-3xl leading-relaxed mb-12 font-medium">אנא הורדו את התבנית, מלאו אותה והעלו בשלב הבא של הטופס.</p>
                                <div className="space-y-6">
                                    {activeModal === 'info' && <a href="template_info.docx" download className="block bg-[#070543] text-white text-center py-10 rounded-3xl text-4xl font-black shadow-xl hover:bg-black transition-all">📥 הורד תבנית דף מידע</a>}
                                    {activeModal === 'costs' && <a href="template_costs.docx" download className="block bg-[#070543] text-white text-center py-10 rounded-3xl text-4xl font-black shadow-xl hover:bg-black transition-all">📥 הורד תבנית עלויות</a>}
                                    {activeModal === 'yearly' && (
                                        <div className="p-10 border-4 border-dashed border-[#d946ef]/30 rounded-3xl bg-[#d946ef]/5 text-center">
                                            <p className="text-3xl font-bold text-[#d946ef]">תבנית תפורסם בהמשך</p>
                                        </div>
                                    )}
                                    <button onClick={() => setActiveModal(null)} className="w-full text-2xl font-bold text-gray-400 mt-8 underline">סגור חלון</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
